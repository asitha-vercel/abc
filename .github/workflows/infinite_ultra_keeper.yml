name: INFINITE-ULTRA-KEEPER-PRO

on:
  schedule:
    - cron: "*/44 * * * *"
  workflow_dispatch: 
  push:
    branches: [ main ]

permissions:
  contents: write
  actions: write

jobs:
  loop-engine:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 1. Ultra Fast Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🛠️ 2. Manage Status Folders
        run: |
          # Folder දෙකම හදලා ඒවට dummy files දානවා Git එකට අහුවෙන්න
          mkdir -p vercel_status
          mkdir -p github_status
          
          # Vercel එක Restart වෙන්න කරන Update එක
          echo "Vercel Cycle: $(date)" > vercel_status/last_restart.txt
          echo "Salt: $RANDOM" >> vercel_status/last_restart.txt
          
          # GitHub status එකට නිකන් file එකක් හදනවා error එක එන එක නතර කරන්න
          if [ ! -f github_status/restart_log.txt ]; then
            echo "Init" > github_status/restart_log.txt
          fi

      - name: 🔄 3. Anti-6-Hour GitHub Loop Logic
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          UPTIME_SEC=$(awk '{print $1}' /proc/uptime | cut -d. -f1)
          
          # පැය 5 විනාඩි 45 පිරුණම අලුත් Run එකක් Trigger කරනවා
          if [ "$UPTIME_SEC" -gt 20700 ]; then
            echo "GitHub 6-Hour Limit Approaching. Triggering Next Run..."
            echo "GitHub Re-Triggered At: $(date)" > github_status/restart_log.txt
            gh workflow run infinite_ultra_keeper.yml
          fi

      - name: ⬆️ 4. Push Updates to Repository
        run: |
          git config --global user.name "thanuh-ultra-bot"
          git config --global user.email "bot@ultra-sync.com"
          
          # මෙතන තමයි වැදගත්ම දේ: තියෙන file විතරක් add කරගන්නවා
          git add vercel_status/last_restart.txt
          git add github_status/restart_log.txt
          
          git commit -m "🚀 Power-Sync: $(date +'%H:%M') [skip ci]" || echo "No changes to commit"
          git push

      - name: 🌐 5. Vercel Wake-up Call
        run: |
          # ඔබේ URL එක මෙතනට දාන්න
          curl -Is https://abc-o9yisw0fx-asitha-vercels-projects.vercel.app | head -n 1
          echo "Vercel Pinged Successfully!"
