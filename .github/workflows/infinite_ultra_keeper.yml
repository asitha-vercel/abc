name: INFINITE-ULTRA-KEEPER-PRO

on:
  schedule:
    - cron: "*/44 * * * *"
  workflow_dispatch: 
  push:
    branches: [ main ]

permissions:
  contents: write
  actions: write

jobs:
  loop-engine:
    runs-on: ubuntu-latest
    concurrency:
      group: bot-infinite-loop
      cancel-in-progress: true

    steps:
      - name: 🚀 1. Ultra Fast Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🛠️ 2. Manage Status Folders
        run: |
          mkdir -p vercel_status
          mkdir -p github_status
          echo "Vercel Cycle: $(date)" > vercel_status/last_restart.txt
          echo "Salt: $RANDOM" >> vercel_status/last_restart.txt

      - name: 🔄 3. Anti-6-Hour GitHub Persistence Logic
        run: |
          UPTIME_SEC=$(awk '{print $1}' /proc/uptime | cut -d. -f1)
          if [ "$UPTIME_SEC" -gt 20700 ]; then
            echo "GitHub 6-Hour Limit Approaching..."
            echo "GitHub Re-Triggered At: $(date)" > github_status/restart_log.txt
          fi

      - name: ⬆️ 4. Push Updates to Repository
        run: |
          git config --global user.name "thanuh-ultra-bot"
          git config --global user.email "bot@ultra-sync.com"
          git add vercel_status/last_restart.txt github_status/restart_log.txt || echo "No changes"
          git commit -m "🚀 Sync Cycle: $(date +'%H:%M') [skip ci]" || exit 0
          git push

      - name: ⚡ 5. Self-Trigger Infinite Loop
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          echo "Handing over to the next cycle..."
          # මෙතන තියෙන නම ඔබේ file එකේ නමට (infinite_ultra_keeper.yml) සමාන විය යුතුයි
          gh workflow run infinite_ultra_keeper.yml

      - name: 🌐 6. Vercel Wake-up Call
        run: |
          curl -Is https://abc-one-rust.vercel.app/ | head -n 1
          echo "Vercel Pinged Successfully!"
