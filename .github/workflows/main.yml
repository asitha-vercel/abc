name: Infinite Restart Loop

on:
  workflow_dispatch:

jobs:
  restart-loop:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Loop + Self Restart
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "loop-bot"
          git config --global user.email "loop@bot.com"

          start=$(date +%s)

          while true
          do
            now=$(date +%s)
            diff=$((now - start))

            # 5h 50min = 21000 sec (6h limit avoid කරන්න)
            if [ $diff -gt 21000 ]; then
              echo "Restarting workflow..."

              curl -X POST \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                https://api.github.com/repos/${{ github.repository }}/actions/workflows/loop.yml/dispatches \
                -d '{"ref":"main"}'

              exit 0
            fi

            echo $(date +%s) > restart.txt

            git add restart.txt
            git commit -m "Auto restart $(date)" || echo "No changes"
            git push

            sleep 2580
          done
