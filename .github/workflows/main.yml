name: Ultra Pro Bot Keeper (Vercel + GitHub)

on:
  schedule:
    # සෑම විනාඩි 43කට වරක් ක්‍රියාත්මක වේ
    - cron: "*/43 * * * *"
  workflow_dispatch: # ඕනෑම වෙලාවක මැනුවල් ස්ටාර්ට් කිරීමට
  push:
    branches: [ main ]

permissions:
  contents: write
  actions: write

jobs:
  keep-alive-engine:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Core Restart Logic (Vercel Trigger)
        run: |
          echo "Current Run Time: $(date)"
          mkdir -p health_checks
          # Vercel Deployment එක Trigger කිරීමට restart.txt update කිරීම
          echo "Vercel Restart ID: $GITHUB_RUN_ID-$(date +%s)" > health_checks/restart.txt
          
      - name: 3. Commit and Push to Trigger Vercel
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add health_checks/restart.txt
          git commit -m "Auto-Deploy: $(date)" || echo "No changes to commit"
          git push

      - name: 4. GitHub Workflow Loop (Anti-Expiry Logic)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # පැය 6ක් යනවිට GitHub Actions නතර වීම වැලැක්වීමට workflow එක නැවත පණගැන්වීම
          # මෙය ක්‍රියාත්මක වන්නේ workflow එක run වී පැය 5ක් පමණ ගත වූ පසුවයි (ආරක්ෂිත පියවරක් ලෙස)
          UPTIME_MINUTES=$(uptime -p | grep -oE '[0-9]+' | head -n 1 || echo 0)
          if [ "$UPTIME_MINUTES" -gt 300 ]; then
            echo "Workflow reaching 6-hour limit. Re-triggering itself..."
            gh workflow run ultra_pro_keep_alive.yml
          fi

      - name: 5. Monitor Vercel Health
        run: |
          echo "System Status: Online"
          echo "Vercel Sync: Completed"
          echo "GitHub Action Loop: Active"
